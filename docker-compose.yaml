version: '3.3'

services:
  # Zabbix database
  zabbix-db:
    container_name: zabbix-db
    image: mysql:8.0.45-debian
    restart: always
    environment:
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix
      - MYSQL_ROOT_PASSWORD=zabbix
    volumes:
      - ./init-zabbix.sql:/docker-entrypoint-initdb.d/init-zabbix.sql:ro

  # create database zabbix character set utf8mb4 collate utf8mb4_bin;
  # grant all privileges on zabbix.* to 'zabbix'@'%';
  # set global log_bin_trust_function_creators = 1;

  # Zabbix server
  zabbix-server:
    container_name: zabbix-server
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    restart: always
    ports:
      - 10051:10051
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MYSQL_ROOT_USER=zabbix
      - MYSQL_ROOT_PASSWORD=zabbix
      - DB_SERVER_HOST=zabbix-db
      - ZBX_STARTPINGERS=4
    depends_on:
      - zabbix-db

  # Zabbix web UI
  zabbix-web:
    container_name: zabbix-web
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    restart: always
    ports:
      - 8282:8080
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix
      - DB_SERVER_HOST=zabbix-db
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_NAME=Zabbix Docker
      - PHP_TZ=America/Sao_Paulo
    depends_on:
      - zabbix-db
      - zabbix-server

  grafana:
    container_name: grafana
    image: grafana/grafana:10.6.1
    restart: always
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
    depends_on:
      - zabbix-server